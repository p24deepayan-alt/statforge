<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Add Divider Dialog</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Space+Grotesk:wght@500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "surface-dim": "#d8dad9",
                      "secondary-container": "#e1dfdf",
                      "inverse-primary": "#b6c4ff",
                      "on-tertiary-container": "#3dacac",
                      "surface": "#f8faf9",
                      "surface-container-highest": "#e1e3e2",
                      "secondary-fixed": "#e4e2e2",
                      "on-secondary": "#ffffff",
                      "primary-fixed": "#dce1ff",
                      "on-tertiary-fixed": "#002020",
                      "on-error": "#ffffff",
                      "on-error-container": "#93000a",
                      "surface-variant": "#e1e3e2",
                      "on-surface-variant": "#454650",
                      "primary-container": "#1b2f6e",
                      "outline-variant": "#c5c5d2",
                      "surface-container-lowest": "#ffffff",
                      "secondary-fixed-dim": "#c7c6c6",
                      "on-secondary-fixed-variant": "#464747",
                      "surface-container": "#eceeed",
                      "secondary": "#5e5e5e",
                      "outline": "#757681",
                      "inverse-on-surface": "#eff1f0",
                      "tertiary-fixed-dim": "#6ed7d7",
                      "on-primary-fixed-variant": "#304382",
                      "surface-container-low": "#f2f4f3",
                      "surface-bright": "#f8faf9",
                      "tertiary": "#002424",
                      "primary-fixed-dim": "#b6c4ff",
                      "on-primary-fixed": "#001550",
                      "on-primary-container": "#8799df",
                      "on-background": "#191c1c",
                      "on-secondary-fixed": "#1b1c1c",
                      "on-tertiary": "#ffffff",
                      "primary": "#001857",
                      "on-secondary-container": "#626262",
                      "error": "#ba1a1a",
                      "on-primary": "#ffffff",
                      "error-container": "#ffdad6",
                      "surface-container-high": "#e6e9e8",
                      "on-tertiary-fixed-variant": "#004f50",
                      "on-surface": "#191c1c",
                      "inverse-surface": "#2e3131",
                      "background": "#f8faf9",
                      "tertiary-fixed": "#8bf3f3",
                      "tertiary-container": "#003b3b",
                      "surface-tint": "#495b9c"
              },
              "borderRadius": {
                      "DEFAULT": "0.125rem",
                      "lg": "0.25rem",
                      "xl": "0.5rem",
                      "full": "0.75rem"
              },
              "spacing": {
                      "xs": "4px",
                      "sidebar_width": "260px",
                      "md": "16px",
                      "base": "4px",
                      "sm": "8px",
                      "xl": "32px",
                      "lg": "24px",
                      "gutter": "12px"
              },
              "fontFamily": {
                      "label-caps": [
                              "Inter"
                      ],
                      "h1": [
                              "Inter"
                      ],
                      "body-sm": [
                              "Inter"
                      ],
                      "body-md": [
                              "Inter"
                      ],
                      "h2": [
                              "Inter"
                      ],
                      "data-mono": [
                              "Space Grotesk"
                      ]
              },
              "fontSize": {
                      "label-caps": [
                              "11px",
                              {
                                      "lineHeight": "16px",
                                      "letterSpacing": "0.05em",
                                      "fontWeight": "700"
                              }
                      ],
                      "h1": [
                              "24px",
                              {
                                      "lineHeight": "32px",
                                      "letterSpacing": "-0.02em",
                                      "fontWeight": "600"
                              }
                      ],
                      "body-sm": [
                              "12px",
                              {
                                      "lineHeight": "16px",
                                      "fontWeight": "400"
                              }
                      ],
                      "body-md": [
                              "14px",
                              {
                                      "lineHeight": "20px",
                                      "fontWeight": "400"
                              }
                      ],
                      "h2": [
                              "20px",
                              {
                                      "lineHeight": "28px",
                                      "letterSpacing": "-0.01em",
                                      "fontWeight": "600"
                              }
                      ],
                      "data-mono": [
                              "13px",
                              {
                                      "lineHeight": "18px",
                                      "letterSpacing": "0.02em",
                                      "fontWeight": "500"
                              }
                      ]
              }
      },
          },
        }
      </script>
</head>
<body class="bg-surface-dim min-h-screen flex items-center justify-center p-md">
<div class="bg-surface-container-lowest border border-outline-variant rounded-lg shadow-lg w-full max-w-[320px] flex flex-col">
<!-- Header -->
<div class="px-md py-sm border-b border-surface-variant flex items-center justify-between">
<h2 class="font-h2 text-h2 text-on-surface">Add Divider</h2>
<button class="text-on-surface-variant hover:text-on-surface transition-colors">
<span class="material-symbols-outlined text-[20px]">close</span>
</button>
</div>
<!-- Content -->
<div class="p-md flex flex-col gap-lg">
<!-- Line Weight -->
<div class="flex flex-col gap-sm">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase">Line Weight</label>
<div class="grid grid-cols-3 gap-sm">
<button class="border border-outline-variant bg-surface rounded hover:bg-surface-container-low flex flex-col items-center justify-center py-sm px-xs gap-xs transition-colors">
<div class="w-full h-[1px] bg-on-surface"></div>
<span class="font-body-sm text-body-sm text-on-surface">Thin</span>
</button>
<button class="border border-primary bg-primary-container/10 rounded flex flex-col items-center justify-center py-sm px-xs gap-xs">
<div class="w-full h-[2px] bg-primary"></div>
<span class="font-body-sm text-body-sm text-primary font-medium">Medium</span>
</button>
<button class="border border-outline-variant bg-surface rounded hover:bg-surface-container-low flex flex-col items-center justify-center py-sm px-xs gap-xs transition-colors">
<div class="w-full h-[4px] bg-on-surface"></div>
<span class="font-body-sm text-body-sm text-on-surface">Thick</span>
</button>
</div>
</div>
<!-- Style -->
<div class="flex flex-col gap-sm">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase">Style</label>
<div class="grid grid-cols-3 gap-sm">
<button class="border border-primary bg-primary-container/10 rounded flex flex-col items-center justify-center py-sm px-xs gap-xs">
<div class="w-full h-[2px] bg-primary"></div>
<span class="font-body-sm text-body-sm text-primary font-medium">Solid</span>
</button>
<button class="border border-outline-variant bg-surface rounded hover:bg-surface-container-low flex flex-col items-center justify-center py-sm px-xs gap-xs transition-colors">
<div class="w-full border-t-2 border-dashed border-on-surface"></div>
<span class="font-body-sm text-body-sm text-on-surface">Dashed</span>
</button>
<button class="border border-outline-variant bg-surface rounded hover:bg-surface-container-low flex flex-col items-center justify-center py-sm px-xs gap-xs transition-colors">
<div class="w-full border-t-2 border-dotted border-on-surface"></div>
<span class="font-body-sm text-body-sm text-on-surface">Dotted</span>
</button>
</div>
</div>
</div>
<!-- Footer -->
<div class="px-md py-sm border-t border-surface-variant flex justify-end gap-sm bg-surface">
<button class="px-md py-sm border border-outline-variant bg-surface-container-lowest text-on-surface font-body-md text-body-md rounded hover:bg-surface-container-low transition-colors">
                Cancel
            </button>
<button class="px-md py-sm bg-primary text-on-primary font-body-md text-body-md rounded hover:opacity-90 transition-opacity">
                Insert
            </button>
</div>
</div>
</body></html>
