<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Add Text Block</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Space+Grotesk:wght@500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-dim": "#d8dad9",
                        "secondary-container": "#e1dfdf",
                        "inverse-primary": "#b6c4ff",
                        "on-tertiary-container": "#3dacac",
                        "surface": "#f8faf9",
                        "surface-container-highest": "#e1e3e2",
                        "secondary-fixed": "#e4e2e2",
                        "on-secondary": "#ffffff",
                        "primary-fixed": "#dce1ff",
                        "on-tertiary-fixed": "#002020",
                        "on-error": "#ffffff",
                        "on-error-container": "#93000a",
                        "surface-variant": "#e1e3e2",
                        "on-surface-variant": "#454650",
                        "primary-container": "#1b2f6e",
                        "outline-variant": "#c5c5d2",
                        "surface-container-lowest": "#ffffff",
                        "secondary-fixed-dim": "#c7c6c6",
                        "on-secondary-fixed-variant": "#464747",
                        "surface-container": "#eceeed",
                        "secondary": "#5e5e5e",
                        "outline": "#757681",
                        "inverse-on-surface": "#eff1f0",
                        "tertiary-fixed-dim": "#6ed7d7",
                        "on-primary-fixed-variant": "#304382",
                        "surface-container-low": "#f2f4f3",
                        "surface-bright": "#f8faf9",
                        "tertiary": "#002424",
                        "primary-fixed-dim": "#b6c4ff",
                        "on-primary-fixed": "#001550",
                        "on-primary-container": "#8799df",
                        "on-background": "#191c1c",
                        "on-secondary-fixed": "#1b1c1c",
                        "on-tertiary": "#ffffff",
                        "primary": "#001857",
                        "on-secondary-container": "#626262",
                        "error": "#ba1a1a",
                        "on-primary": "#ffffff",
                        "error-container": "#ffdad6",
                        "surface-container-high": "#e6e9e8",
                        "on-tertiary-fixed-variant": "#004f50",
                        "on-surface": "#191c1c",
                        "inverse-surface": "#2e3131",
                        "background": "#f8faf9",
                        "tertiary-fixed": "#8bf3f3",
                        "tertiary-container": "#003b3b",
                        "surface-tint": "#495b9c"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "xs": "4px",
                        "sidebar_width": "260px",
                        "md": "16px",
                        "base": "4px",
                        "sm": "8px",
                        "xl": "32px",
                        "lg": "24px",
                        "gutter": "12px"
                    },
                    "fontFamily": {
                        "label-caps": ["Inter"],
                        "h1": ["Inter"],
                        "body-sm": ["Inter"],
                        "body-md": ["Inter"],
                        "h2": ["Inter"],
                        "data-mono": ["Space Grotesk"]
                    },
                    "fontSize": {
                        "label-caps": ["11px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "700" }],
                        "h1": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.02em", "fontWeight": "600" }],
                        "body-sm": ["12px", { "lineHeight": "16px", "fontWeight": "400" }],
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "h2": ["20px", { "lineHeight": "28px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "data-mono": ["13px", { "lineHeight": "18px", "letterSpacing": "0.02em", "fontWeight": "500" }]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .icon-fill {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex items-center justify-center p-lg font-body-md">
<!-- Modal Backdrop -->
<div class="fixed inset-0 bg-on-background/20 backdrop-blur-sm flex items-center justify-center z-50">
<!-- Dialog Container -->
<div class="bg-surface-container-lowest border border-outline-variant w-full max-w-2xl shadow-[0_8px_30px_rgb(0,0,0,0.08)] flex flex-col">
<!-- Dialog Header -->
<div class="flex items-center justify-between px-md py-sm border-b border-outline-variant bg-surface-container-low">
<h2 class="font-h2 text-h2 text-on-surface">Add Text Block</h2>
<button class="text-on-surface-variant hover:text-on-surface transition-colors">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
</div>
<!-- Dialog Body -->
<div class="p-md flex flex-col gap-md">
<!-- Title Input -->
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant" for="block-title">Block Title (Optional)</label>
<input class="w-full border border-outline-variant bg-surface-container-lowest px-sm py-xs text-body-md font-body-md text-on-surface focus:border-primary-container focus:ring-2 focus:ring-primary-container/20 outline-none transition-all" id="block-title" placeholder="e.g., Executive Summary" type="text"/>
</div>
<!-- Rich Text Editor Container -->
<div class="flex flex-col border border-outline-variant bg-surface-container-lowest">
<!-- Formatting Toolbar -->
<div class="flex items-center gap-xs p-xs border-b border-outline-variant bg-surface-container w-full overflow-x-auto">
<div class="flex items-center gap-base">
<button class="p-base text-on-surface-variant hover:bg-surface-variant hover:text-on-surface rounded-DEFAULT transition-colors" title="Bold">
<span class="material-symbols-outlined" data-icon="format_bold">format_bold</span>
</button>
<button class="p-base text-on-surface-variant hover:bg-surface-variant hover:text-on-surface rounded-DEFAULT transition-colors" title="Italic">
<span class="material-symbols-outlined" data-icon="format_italic">format_italic</span>
</button>
<button class="p-base text-on-surface-variant hover:bg-surface-variant hover:text-on-surface rounded-DEFAULT transition-colors" title="Underline">
<span class="material-symbols-outlined" data-icon="format_underlined">format_underlined</span>
</button>
</div>
<div class="w-px h-5 bg-outline-variant mx-base"></div>
<div class="flex items-center gap-base">
<button class="p-base text-on-surface-variant hover:bg-surface-variant hover:text-on-surface rounded-DEFAULT transition-colors" title="Heading 1">
<span class="material-symbols-outlined" data-icon="format_h1">format_h1</span>
</button>
<button class="p-base text-on-surface-variant hover:bg-surface-variant hover:text-on-surface rounded-DEFAULT transition-colors" title="Heading 2">
<span class="material-symbols-outlined" data-icon="format_h2">format_h2</span>
</button>
</div>
<div class="w-px h-5 bg-outline-variant mx-base"></div>
<div class="flex items-center gap-base">
<button class="p-base text-on-surface-variant hover:bg-surface-variant hover:text-on-surface rounded-DEFAULT transition-colors" title="Align Left">
<span class="material-symbols-outlined" data-icon="format_align_left">format_align_left</span>
</button>
<button class="p-base text-on-surface-variant hover:bg-surface-variant hover:text-on-surface rounded-DEFAULT transition-colors" title="Align Center">
<span class="material-symbols-outlined" data-icon="format_align_center">format_align_center</span>
</button>
</div>
<div class="w-px h-5 bg-outline-variant mx-base"></div>
<div class="flex items-center gap-base">
<button class="p-base text-on-surface-variant hover:bg-surface-variant hover:text-on-surface rounded-DEFAULT transition-colors" title="Bullet List">
<span class="material-symbols-outlined" data-icon="format_list_bulleted">format_list_bulleted</span>
</button>
<button class="p-base text-on-surface-variant hover:bg-surface-variant hover:text-on-surface rounded-DEFAULT transition-colors" title="Numbered List">
<span class="material-symbols-outlined" data-icon="format_list_numbered">format_list_numbered</span>
</button>
</div>
<div class="w-px h-5 bg-outline-variant mx-base"></div>
<div class="flex items-center gap-base">
<button class="p-base text-on-surface-variant hover:bg-surface-variant hover:text-on-surface rounded-DEFAULT transition-colors" title="Insert Link">
<span class="material-symbols-outlined" data-icon="link">link</span>
</button>
<button class="p-base text-on-surface-variant hover:bg-surface-variant hover:text-on-surface rounded-DEFAULT transition-colors" title="Insert Code Block">
<span class="material-symbols-outlined" data-icon="code">code</span>
</button>
</div>
</div>
<!-- Editor Area -->
<textarea class="w-full h-64 p-sm font-body-md text-body-md text-on-surface bg-transparent border-none focus:ring-0 resize-y" placeholder="Enter your text here..."></textarea>
<!-- Editor Footer / Word Count -->
<div class="flex justify-end px-sm py-xs border-t border-outline-variant bg-surface-container-low">
<span class="font-body-sm text-body-sm text-on-surface-variant">0 words</span>
</div>
</div>
</div>
<!-- Dialog Footer -->
<div class="flex items-center justify-end gap-md px-md py-sm border-t border-outline-variant bg-surface-container-low mt-auto">
<button class="px-md py-xs bg-surface-container-lowest text-on-surface border border-outline-variant hover:bg-surface-container transition-colors font-body-md text-body-md">
                    Cancel
                </button>
<button class="px-md py-xs bg-primary-container text-on-primary hover:bg-primary transition-colors font-body-md text-body-md flex items-center gap-xs">
<span class="material-symbols-outlined text-[18px]" data-icon="add">add</span>
                    Insert Block
                </button>
</div>
</div>
</div>
</body></html>
