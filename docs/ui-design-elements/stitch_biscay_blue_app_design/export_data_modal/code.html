<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Export Data Modal - StatForge</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&amp;family=Space+Grotesk:wght@500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary-fixed": "#002020",
                        "on-error-container": "#93000a",
                        "on-tertiary-fixed-variant": "#004f50",
                        "surface-container-lowest": "#ffffff",
                        "primary-container": "#1b2f6e",
                        "error-container": "#ffdad6",
                        "on-secondary": "#ffffff",
                        "on-secondary-fixed": "#1b1c1c",
                        "surface-container-highest": "#e1e3e2",
                        "surface": "#f8faf9",
                        "on-primary": "#ffffff",
                        "inverse-on-surface": "#eff1f0",
                        "surface-variant": "#e1e3e2",
                        "tertiary-fixed-dim": "#6ed7d7",
                        "primary-fixed-dim": "#b6c4ff",
                        "on-tertiary-container": "#3dacac",
                        "on-background": "#191c1c",
                        "on-surface-variant": "#454650",
                        "primary": "#001857",
                        "on-tertiary": "#ffffff",
                        "background": "#f8faf9",
                        "tertiary-fixed": "#8bf3f3",
                        "surface-container-low": "#f2f4f3",
                        "on-surface": "#191c1c",
                        "on-primary-fixed-variant": "#304382",
                        "surface-dim": "#d8dad9",
                        "secondary-fixed": "#e4e2e2",
                        "on-secondary-fixed-variant": "#464747",
                        "tertiary-container": "#003b3b",
                        "surface-tint": "#495b9c",
                        "surface-bright": "#f8faf9",
                        "inverse-primary": "#b6c4ff",
                        "outline-variant": "#c5c5d2",
                        "inverse-surface": "#2e3131",
                        "on-primary-container": "#8799df",
                        "error": "#ba1a1a",
                        "secondary": "#5e5e5e",
                        "on-error": "#ffffff",
                        "tertiary": "#002424",
                        "secondary-fixed-dim": "#c7c6c6",
                        "surface-container-high": "#e6e9e8",
                        "secondary-container": "#e1dfdf",
                        "on-primary-fixed": "#001550",
                        "outline": "#757681",
                        "primary-fixed": "#dce1ff",
                        "on-secondary-container": "#626262",
                        "surface-container": "#eceeed"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "xs": "4px",
                        "lg": "24px",
                        "md": "16px",
                        "gutter": "12px",
                        "base": "4px",
                        "sidebar_width": "260px",
                        "xl": "32px",
                        "sm": "8px"
                    },
                    "fontFamily": {
                        "h2": ["Inter"],
                        "data-mono": ["Space Grotesk"],
                        "label-caps": ["Inter"],
                        "body-sm": ["Inter"],
                        "body-md": ["Inter"],
                        "h1": ["Inter"]
                    },
                    "fontSize": {
                        "h2": ["20px", { "lineHeight": "28px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "data-mono": ["13px", { "lineHeight": "18px", "letterSpacing": "0.02em", "fontWeight": "500" }],
                        "label-caps": ["11px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "700" }],
                        "body-sm": ["12px", { "lineHeight": "16px", "fontWeight": "400" }],
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "h1": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.02em", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined[data-weight="fill"] {
            font-variation-settings: 'FILL' 1;
        }
    </style>
</head>
<body class="bg-background text-on-background font-body-md h-screen w-full overflow-hidden flex font-body-md text-body-md">
<!-- Dimmed Background Overlay -->
<div class="fixed inset-0 bg-inverse-surface/40 backdrop-blur-[2px] z-50 flex items-center justify-center p-md">
<!-- Modal Container -->
<div aria-labelledby="modal-title" aria-modal="true" class="bg-surface-container-lowest w-full max-w-[480px] rounded border border-outline-variant shadow-lg flex flex-col" role="dialog">
<!-- Modal Header -->
<div class="px-lg py-md border-b border-outline-variant flex justify-between items-center bg-surface-container-low rounded-t">
<h2 class="font-h2 text-h2 text-on-surface m-0" id="modal-title">Export Data</h2>
<button aria-label="Close modal" class="text-on-surface-variant hover:text-on-surface transition-colors focus:outline-none">
<span class="material-symbols-outlined text-[20px]" data-icon="close">close</span>
</button>
</div>
<!-- Modal Body -->
<div class="p-lg flex flex-col gap-lg">
<!-- Format Dropdown -->
<div class="flex flex-col gap-sm">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase" for="export-format">Format</label>
<div class="relative">
<select class="w-full appearance-none bg-surface-container-lowest border border-outline-variant rounded px-md py-sm font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all" id="export-format">
<option value="csv">CSV (.csv)</option>
<option value="xlsx">Excel (.xlsx)</option>
<option value="parquet">Parquet (.parquet)</option>
</select>
<div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-sm text-on-surface-variant">
<span class="material-symbols-outlined text-[18px]" data-icon="arrow_drop_down">arrow_drop_down</span>
</div>
</div>
</div>
<!-- Filename Input -->
<div class="flex flex-col gap-sm">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase" for="export-filename">Filename</label>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded px-md py-sm font-data-mono text-data-mono text-on-surface focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all placeholder:text-outline" id="export-filename" type="text" value="dataset_export_2023-10-25"/>
</div>
<!-- Options -->
<div class="flex flex-col gap-sm border-t border-outline-variant pt-md mt-sm">
<span class="font-label-caps text-label-caps text-on-surface-variant uppercase">Options</span>
<label class="flex items-center gap-sm cursor-pointer group">
<div class="relative flex items-center">
<input checked="" class="peer sr-only" type="checkbox"/>
<div class="w-10 h-5 bg-outline-variant peer-focus:outline-none peer-focus:ring-2 peer-focus:ring-primary/20 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-outline-variant after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-primary"></div>
</div>
<span class="font-body-sm text-body-sm text-on-surface group-hover:text-primary transition-colors">Include index column</span>
</label>
</div>
<!-- Info Alert (Simulating complex workflow consideration) -->
<div class="bg-surface-container flex items-start gap-sm p-sm rounded border border-outline-variant/50">
<span class="material-symbols-outlined text-[16px] text-on-surface-variant mt-[2px]" data-icon="info">info</span>
<p class="font-body-sm text-body-sm text-on-surface-variant m-0">Estimated file size: ~4.2 MB based on 50,000 rows.</p>
</div>
</div>
<!-- Modal Footer -->
<div class="px-lg py-md border-t border-outline-variant bg-surface-container-low flex justify-end gap-md rounded-b">
<button class="px-md py-sm font-body-sm text-body-sm font-medium bg-surface-container-lowest text-on-surface border border-outline-variant rounded hover:bg-surface-container transition-colors focus:outline-none focus:ring-2 focus:ring-primary/20">
                    Cancel
                </button>
<button class="px-md py-sm font-body-sm text-body-sm font-medium bg-primary text-on-primary rounded hover:bg-on-primary-fixed-variant transition-colors flex items-center gap-sm focus:outline-none focus:ring-2 focus:ring-primary/40 shadow-sm">
<span class="material-symbols-outlined text-[16px]" data-icon="download">download</span>
                    Export
                </button>
</div>
</div>
</div>
</body></html>
