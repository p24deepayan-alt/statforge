<!DOCTYPE html>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background text-on-background font-body-md text-body-md h-screen w-screen overflow-hidden flex relative">
<!-- Background Mockup (Report Builder) -->
<div class="flex flex-col w-full h-full opacity-30 pointer-events-none filter blur-[2px]">
<!-- TopAppBar (Mock) -->
<header class="bg-surface-container-lowest text-primary-container flex items-center justify-between px-6 h-14 w-full sticky top-0 z-50 border-b border-surface-variant">
<div class="flex items-center gap-8">
<div class="text-lg font-bold tracking-tighter text-primary-container">StatForge</div>
<nav class="hidden md:flex gap-6 h-full">
<a class="text-primary-container font-semibold border-b-2 border-primary-container pb-4 pt-4 flex items-center h-full font-body-md text-body-md" href="#">Reports</a>
<a class="text-on-surface-variant font-medium hover:text-primary-container flex items-center h-full pt-4 pb-4 font-body-md text-body-md" href="#">Templates</a>
<a class="text-on-surface-variant font-medium hover:text-primary-container flex items-center h-full pt-4 pb-4 font-body-md text-body-md" href="#">Assets</a>
</nav>
</div>
<div class="flex items-center gap-4">
<button class="text-on-surface-variant hover:bg-surface-container rounded-full p-2 transition-colors">
<span class="material-symbols-outlined">notifications</span>
</button>
<button class="text-on-surface-variant hover:bg-surface-container rounded-full p-2 transition-colors">
<span class="material-symbols-outlined">help_outline</span>
</button>
<button class="bg-primary text-on-primary px-4 py-2 rounded font-body-md text-body-md font-semibold hover:opacity-90">Export</button>
</div>
</header>
<div class="flex flex-1 overflow-hidden">
<!-- SideNavBar (Mock) -->
<nav class="bg-surface-dim text-primary-container w-sidebar_width h-full flex flex-col py-4 z-40 border-r border-surface-variant shrink-0">
<div class="px-6 mb-6">
<h2 class="text-xl font-black text-primary-container font-h2 text-h2">StatForge</h2>
<p class="text-on-surface-variant font-body-sm text-body-sm mt-1">Precision Analytics</p>
</div>
<div class="px-4 mb-6">
<button class="w-full bg-primary text-on-primary py-2 px-4 rounded font-body-md text-body-md font-semibold hover:opacity-90 flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[18px]">add</span> New Report
                    </button>
</div>
<div class="flex-1 flex flex-col gap-1">
<a class="flex items-center gap-3 px-4 py-2 text-on-surface-variant hover:bg-surface-container transition-all font-body-md text-body-md mx-2 rounded" href="#"><span class="material-symbols-outlined">analytics</span> Dashboard</a>
<a class="flex items-center gap-3 px-4 py-2 text-primary-container bg-surface-container-lowest border-r-4 border-primary-container font-bold font-body-md text-body-md mx-2 rounded" href="#"><span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">edit_note</span> Editor</a>
<a class="flex items-center gap-3 px-4 py-2 text-on-surface-variant hover:bg-surface-container transition-all font-body-md text-body-md mx-2 rounded" href="#"><span class="material-symbols-outlined">menu_book</span> Documentation</a>
</div>
</nav>
<!-- Main Content Area (Mock) -->
<main class="flex-1 p-lg bg-background overflow-y-auto">
<div class="max-w-5xl mx-auto space-y-md">
<div class="bg-surface-container-lowest border border-outline-variant p-md rounded flex items-center justify-between">
<h1 class="font-h1 text-h1 text-on-background">Q3 Performance Analysis</h1>
<div class="flex gap-sm">
<button class="px-4 py-2 border border-outline-variant rounded font-body-md text-body-md text-on-surface bg-surface-container-lowest">Save Draft</button>
</div>
</div>
<div class="grid grid-cols-3 gap-md">
<div class="col-span-2 bg-surface-container-lowest border border-outline-variant rounded p-md min-h-[400px]">
<div class="h-8 bg-surface-container w-1/3 mb-4 rounded"></div>
<div class="h-4 bg-surface-container w-full mb-2 rounded"></div>
<div class="h-4 bg-surface-container w-5/6 mb-2 rounded"></div>
<div class="h-4 bg-surface-container w-4/6 rounded"></div>
</div>
<div class="bg-surface-container-lowest border border-outline-variant rounded p-md">
<div class="h-6 bg-surface-container w-1/2 mb-4 rounded"></div>
<div class="h-10 bg-surface-container w-full mb-2 rounded"></div>
<div class="h-10 bg-surface-container w-full mb-2 rounded"></div>
<div class="h-10 bg-surface-container w-full rounded"></div>
</div>
</div>
</div>
</main>
</div>
</div>
<!-- Modal Overlay -->
<div class="fixed inset-0 bg-on-background/40 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
<!-- Modal Container -->
<div class="bg-surface-container-lowest w-full max-w-md rounded-lg shadow-[0_8px_32px_rgba(0,0,0,0.12)] border border-outline-variant flex flex-col overflow-hidden animate-in fade-in zoom-in-95 duration-200">
<!-- Modal Header -->
<div class="flex items-center justify-between px-lg py-md border-b border-surface-variant bg-surface-bright">
<h2 class="font-h2 text-h2 text-on-background flex items-center gap-sm">
<span class="material-symbols-outlined text-primary">html</span>
                    Export HTML
                </h2>
<button aria-label="Close modal" class="text-on-surface-variant hover:text-on-background hover:bg-surface-container-low p-1 rounded transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<!-- Modal Body -->
<div class="px-lg py-lg flex flex-col gap-lg">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                    Generate a self-contained HTML file of your current report. Select export preferences below to optimize the output.
                </p>
<div class="flex flex-col gap-md">
<!-- Option 1 -->
<label class="flex items-start gap-3 cursor-pointer group p-sm -m-sm hover:bg-surface-container-low rounded transition-colors">
<div class="flex items-center h-5 mt-0.5">
<input checked="" class="form-checkbox h-4 w-4 text-primary border-outline rounded bg-surface-container-lowest focus:ring-primary focus:ring-offset-0 focus:ring-2" type="checkbox"/>
</div>
<div class="flex flex-col">
<span class="font-body-md text-body-md text-on-background font-medium group-hover:text-primary transition-colors">Include all assets as base64</span>
<span class="font-body-sm text-body-sm text-on-surface-variant mt-0.5">Embeds images and styles directly into the file for offline viewing. Increases file size.</span>
</div>
</label>
<!-- Option 2 -->
<label class="flex items-start gap-3 cursor-pointer group p-sm -m-sm hover:bg-surface-container-low rounded transition-colors">
<div class="flex items-center h-5 mt-0.5">
<input class="form-checkbox h-4 w-4 text-primary border-outline rounded bg-surface-container-lowest focus:ring-primary focus:ring-offset-0 focus:ring-2" type="checkbox"/>
</div>
<div class="flex flex-col">
<span class="font-body-md text-body-md text-on-background font-medium group-hover:text-primary transition-colors">Minify HTML</span>
<span class="font-body-sm text-body-sm text-on-surface-variant mt-0.5">Removes whitespace and comments to reduce overall file size. Recommended for production.</span>
</div>
</label>
</div>
<div class="mt-2">
<label class="block font-label-caps text-label-caps text-on-surface-variant mb-sm uppercase">Filename</label>
<div class="relative">
<input class="w-full bg-surface-container-lowest border border-outline-variant text-on-background font-data-mono text-data-mono rounded px-3 py-2 focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none pr-12 transition-shadow" type="text" value="Q3_Performance_Analysis"/>
<span class="absolute right-3 top-1/2 -translate-y-1/2 font-data-mono text-data-mono text-on-surface-variant">.html</span>
</div>
</div>
</div>
<!-- Modal Footer -->
<div class="px-lg py-md border-t border-surface-variant bg-surface-container-lowest flex items-center justify-end gap-sm">
<button class="px-4 py-2 font-body-md text-body-md font-medium text-on-surface border border-outline-variant bg-surface-container-lowest hover:bg-surface-container-low rounded transition-colors focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-1">
                    Cancel
                </button>
<button class="px-4 py-2 font-body-md text-body-md font-medium text-on-primary bg-primary hover:bg-primary-container rounded transition-colors flex items-center gap-2 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-1 shadow-sm">
<span class="material-symbols-outlined text-[18px]">download</span>
                    Download
                </button>
</div>
</div>
</div>
