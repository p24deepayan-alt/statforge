<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Filter View - StatForge</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&amp;family=Space+Grotesk:wght@500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "on-tertiary-fixed": "#002020",
                      "on-error-container": "#93000a",
                      "on-tertiary-fixed-variant": "#004f50",
                      "surface-container-lowest": "#ffffff",
                      "primary-container": "#1b2f6e",
                      "error-container": "#ffdad6",
                      "on-secondary": "#ffffff",
                      "on-secondary-fixed": "#1b1c1c",
                      "surface-container-highest": "#e1e3e2",
                      "surface": "#f8faf9",
                      "on-primary": "#ffffff",
                      "inverse-on-surface": "#eff1f0",
                      "surface-variant": "#e1e3e2",
                      "tertiary-fixed-dim": "#6ed7d7",
                      "primary-fixed-dim": "#b6c4ff",
                      "on-tertiary-container": "#3dacac",
                      "on-background": "#191c1c",
                      "on-surface-variant": "#454650",
                      "primary": "#001857",
                      "on-tertiary": "#ffffff",
                      "background": "#f8faf9",
                      "tertiary-fixed": "#8bf3f3",
                      "surface-container-low": "#f2f4f3",
                      "on-surface": "#191c1c",
                      "on-primary-fixed-variant": "#304382",
                      "surface-dim": "#d8dad9",
                      "secondary-fixed": "#e4e2e2",
                      "on-secondary-fixed-variant": "#464747",
                      "tertiary-container": "#003b3b",
                      "surface-tint": "#495b9c",
                      "surface-bright": "#f8faf9",
                      "inverse-primary": "#b6c4ff",
                      "outline-variant": "#c5c5d2",
                      "inverse-surface": "#2e3131",
                      "on-primary-container": "#8799df",
                      "error": "#ba1a1a",
                      "secondary": "#5e5e5e",
                      "on-error": "#ffffff",
                      "tertiary": "#002424",
                      "secondary-fixed-dim": "#c7c6c6",
                      "surface-container-high": "#e6e9e8",
                      "secondary-container": "#e1dfdf",
                      "on-primary-fixed": "#001550",
                      "outline": "#757681",
                      "primary-fixed": "#dce1ff",
                      "on-secondary-container": "#626262",
                      "surface-container": "#eceeed"
              },
              "borderRadius": {
                      "DEFAULT": "0.125rem",
                      "lg": "0.25rem",
                      "xl": "0.5rem",
                      "full": "0.75rem"
              },
              "spacing": {
                      "xs": "4px",
                      "lg": "24px",
                      "md": "16px",
                      "gutter": "12px",
                      "base": "4px",
                      "sidebar_width": "260px",
                      "xl": "32px",
                      "sm": "8px"
              },
              "fontFamily": {
                      "h2": [
                              "Inter"
                      ],
                      "data-mono": [
                              "Space Grotesk"
                      ],
                      "label-caps": [
                              "Inter"
                      ],
                      "body-sm": [
                              "Inter"
                      ],
                      "body-md": [
                              "Inter"
                      ],
                      "h1": [
                              "Inter"
                      ]
              },
              "fontSize": {
                      "h2": [
                              "20px",
                              {
                                      "lineHeight": "28px",
                                      "letterSpacing": "-0.01em",
                                      "fontWeight": "600"
                              }
                      ],
                      "data-mono": [
                              "13px",
                              {
                                      "lineHeight": "18px",
                                      "letterSpacing": "0.02em",
                                      "fontWeight": "500"
                              }
                      ],
                      "label-caps": [
                              "11px",
                              {
                                      "lineHeight": "16px",
                                      "letterSpacing": "0.05em",
                                      "fontWeight": "700"
                              }
                      ],
                      "body-sm": [
                              "12px",
                              {
                                      "lineHeight": "16px",
                                      "fontWeight": "400"
                              }
                      ],
                      "body-md": [
                              "14px",
                              {
                                      "lineHeight": "20px",
                                      "fontWeight": "400"
                              }
                      ],
                      "h1": [
                              "24px",
                              {
                                      "lineHeight": "32px",
                                      "letterSpacing": "-0.02em",
                                      "fontWeight": "600"
                              }
                      ]
              }
      },
          },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined[data-weight="fill"] {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background text-on-background font-body-md text-body-md min-h-screen overflow-hidden">
<!-- Background App Shell (Dimmed) -->
<div aria-labelledby="modal-title" aria-modal="true" class="fixed inset-0 bg-black/40 z-50 backdrop-blur-[2px] flex items-center justify-center" role="dialog">
<!-- Filter Modal -->
<div class="bg-surface-container-lowest border border-outline-variant/30 rounded shadow-[0_16px_32px_-4px_rgba(0,0,0,0.1)] w-full max-w-3xl max-h-[921px] flex flex-col overflow-hidden">
<!-- Modal Header -->
<div class="flex items-center justify-between px-lg py-md border-b border-outline-variant/30 bg-surface-bright">
<div class="flex items-center gap-sm text-primary">
<span class="material-symbols-outlined text-[20px]">filter_list</span>
<h2 class="font-h2 text-h2 text-on-surface" id="modal-title">Filter View</h2>
</div>
<div class="flex items-center gap-md">
<button class="text-on-surface-variant hover:text-primary transition-colors font-body-sm text-body-sm">Clear All</button>
<button aria-label="Close modal" class="text-on-surface-variant hover:text-on-surface transition-colors p-sm rounded hover:bg-surface-container-low">
<span class="material-symbols-outlined text-[20px]">close</span>
</button>
</div>
</div>
<!-- Modal Body -->
<div class="p-lg overflow-y-auto flex-1 bg-surface-bright space-y-md">
<!-- Rule 1 -->
<div class="flex items-start gap-md group">
<div class="mt-xs">
<span class="material-symbols-outlined text-[16px] text-outline cursor-grab">drag_indicator</span>
</div>
<div class="flex-1 grid grid-cols-[minmax(150px,1fr)_minmax(120px,1fr)_minmax(200px,2fr)] gap-md items-center">
<select aria-label="Column" class="w-full bg-surface-container-lowest border-outline-variant/50 border rounded text-body-sm font-body-sm py-xs px-sm text-on-surface focus:border-primary focus:ring-2 focus:ring-primary/20 h-[32px] appearance-none">
<option>Transaction ID</option>
<option>Status</option>
<option selected="">Revenue</option>
<option>Date</option>
</select>
<select aria-label="Operator" class="w-full bg-surface-container-lowest border-outline-variant/50 border rounded text-body-sm font-body-sm py-xs px-sm text-on-surface focus:border-primary focus:ring-2 focus:ring-primary/20 h-[32px] appearance-none">
<option>Equals</option>
<option>Not equals</option>
<option selected="">Greater than</option>
<option>Less than</option>
<option>Contains</option>
</select>
<input aria-label="Value" class="w-full bg-surface-container-lowest border-outline-variant/50 border rounded text-body-sm font-body-sm py-xs px-sm text-on-surface focus:border-primary focus:ring-2 focus:ring-primary/20 h-[32px] font-data-mono text-data-mono" type="number" value="1000"/>
</div>
<button aria-label="Remove rule" class="p-xs text-outline hover:text-error transition-colors mt-xs rounded hover:bg-error-container/50 opacity-0 group-hover:opacity-100">
<span class="material-symbols-outlined text-[18px]">delete</span>
</button>
</div>
<!-- AND Connector -->
<div class="pl-[36px] flex items-center gap-sm">
<div class="w-[1px] h-lg bg-outline-variant/50"></div>
<span class="text-label-caps font-label-caps text-on-surface-variant bg-surface-container-low px-sm py-[2px] rounded border border-outline-variant/30">AND</span>
</div>
<!-- Rule 2 -->
<div class="flex items-start gap-md group">
<div class="mt-xs">
<span class="material-symbols-outlined text-[16px] text-outline cursor-grab">drag_indicator</span>
</div>
<div class="flex-1 grid grid-cols-[minmax(150px,1fr)_minmax(120px,1fr)_minmax(200px,2fr)] gap-md items-center">
<select aria-label="Column" class="w-full bg-surface-container-lowest border-outline-variant/50 border rounded text-body-sm font-body-sm py-xs px-sm text-on-surface focus:border-primary focus:ring-2 focus:ring-primary/20 h-[32px] appearance-none">
<option>Transaction ID</option>
<option selected="">Status</option>
<option>Revenue</option>
<option>Date</option>
</select>
<select aria-label="Operator" class="w-full bg-surface-container-lowest border-outline-variant/50 border rounded text-body-sm font-body-sm py-xs px-sm text-on-surface focus:border-primary focus:ring-2 focus:ring-primary/20 h-[32px] appearance-none">
<option selected="">Equals</option>
<option>Not equals</option>
<option>Contains</option>
</select>
<select aria-label="Value" class="w-full bg-surface-container-lowest border-outline-variant/50 border rounded text-body-sm font-body-sm py-xs px-sm text-on-surface focus:border-primary focus:ring-2 focus:ring-primary/20 h-[32px] appearance-none">
<option selected="">Completed</option>
<option>Pending</option>
<option>Failed</option>
</select>
</div>
<button aria-label="Remove rule" class="p-xs text-outline hover:text-error transition-colors mt-xs rounded hover:bg-error-container/50 opacity-0 group-hover:opacity-100">
<span class="material-symbols-outlined text-[18px]">delete</span>
</button>
</div>
<!-- Add Rule Action -->
<div class="pt-sm pl-[36px]">
<button class="flex items-center gap-xs text-primary hover:text-primary-container transition-colors font-body-sm text-body-sm py-xs px-sm rounded hover:bg-primary-fixed/20">
<span class="material-symbols-outlined text-[18px]">add</span>
                        Add Rule
                    </button>
</div>
</div>
<!-- Modal Footer -->
<div class="flex items-center justify-end px-lg py-md border-t border-outline-variant/30 bg-surface-container-low gap-sm">
<button class="px-md py-sm border border-outline-variant/50 rounded bg-surface-container-lowest text-on-surface font-body-sm text-body-sm hover:bg-surface-variant transition-colors min-w-[100px]">Cancel</button>
<button class="px-md py-sm border border-transparent rounded bg-primary text-on-primary font-body-sm text-body-sm hover:bg-primary-container transition-colors min-w-[120px] shadow-[0_1px_2px_rgba(0,0,0,0.1)]">Apply Filters</button>
</div>
</div>
</div>
</body></html>
