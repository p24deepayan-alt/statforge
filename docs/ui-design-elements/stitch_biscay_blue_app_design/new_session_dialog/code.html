<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>New Session - StatForge</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&amp;family=Space+Grotesk:wght@500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "inverse-primary": "#b6c4ff",
                        "surface-bright": "#f8faf9",
                        "tertiary-container": "#003b3b",
                        "surface-container-low": "#f2f4f3",
                        "outline-variant": "#c5c5d2",
                        "on-background": "#191c1c",
                        "surface-dim": "#d8dad9",
                        "secondary-fixed-dim": "#c7c6c6",
                        "surface-container-highest": "#e1e3e2",
                        "surface-container-high": "#e6e9e8",
                        "on-tertiary-fixed-variant": "#004f50",
                        "surface-tint": "#495b9c",
                        "secondary": "#5e5e5e",
                        "surface-variant": "#e1e3e2",
                        "on-error": "#ffffff",
                        "tertiary-fixed-dim": "#6ed7d7",
                        "surface": "#f8faf9",
                        "on-secondary-fixed-variant": "#464747",
                        "on-primary-fixed-variant": "#304382",
                        "surface-container-lowest": "#ffffff",
                        "tertiary": "#002424",
                        "on-primary-fixed": "#001550",
                        "primary-fixed": "#dce1ff",
                        "on-tertiary-container": "#3dacac",
                        "outline": "#757681",
                        "on-secondary-fixed": "#1b1c1c",
                        "on-secondary-container": "#626262",
                        "on-primary": "#ffffff",
                        "background": "#f8faf9",
                        "inverse-on-surface": "#eff1f0",
                        "on-primary-container": "#8799df",
                        "primary-fixed-dim": "#b6c4ff",
                        "on-tertiary-fixed": "#002020",
                        "inverse-surface": "#2e3131",
                        "on-secondary": "#ffffff",
                        "secondary-fixed": "#e4e2e2",
                        "on-tertiary": "#ffffff",
                        "error": "#ba1a1a",
                        "primary": "#001857",
                        "surface-container": "#eceeed",
                        "on-surface-variant": "#454650",
                        "on-surface": "#191c1c",
                        "tertiary-fixed": "#8bf3f3",
                        "secondary-container": "#e1dfdf",
                        "on-error-container": "#93000a",
                        "primary-container": "#1b2f6e",
                        "error-container": "#ffdad6"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "xl": "32px",
                        "base": "4px",
                        "md": "16px",
                        "sm": "8px",
                        "gutter": "12px",
                        "xs": "4px",
                        "lg": "24px",
                        "sidebar_width": "260px"
                    },
                    "fontFamily": {
                        "body-md": ["Inter"],
                        "h2": ["Inter"],
                        "data-mono": ["Space Grotesk"],
                        "body-sm": ["Inter"],
                        "label-caps": ["Inter"],
                        "h1": ["Inter"]
                    },
                    "fontSize": {
                        "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "h2": ["20px", {"lineHeight": "28px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "data-mono": ["13px", {"lineHeight": "18px", "letterSpacing": "0.02em", "fontWeight": "500"}],
                        "body-sm": ["12px", {"lineHeight": "16px", "fontWeight": "400"}],
                        "label-caps": ["11px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "700"}],
                        "h1": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.02em", "fontWeight": "600"}]

                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .fill-icon {
            font-variation-settings: 'FILL' 1;
        }
    </style>
</head>
<body class="bg-background text-on-background font-body-md text-body-md antialiased min-h-screen flex">
<!-- Dimmed Background (Simulating underlying Sessions view) -->
<div class="fixed inset-0 bg-on-background/40 backdrop-blur-sm z-40 flex items-center justify-center p-md">
<!-- Modal Container -->
<div class="bg-surface-container-lowest rounded-xl border border-surface-variant w-full max-w-lg shadow-[0_16px_32px_rgba(0,0,0,0.1)] flex flex-col overflow-hidden z-50">
<!-- Modal Header -->
<div class="px-lg py-md border-b border-surface-variant flex items-center justify-between bg-surface-bright">
<h2 class="font-h2 text-h2 text-on-surface">New Session</h2>
<button aria-label="Close modal" class="text-on-surface-variant hover:text-on-surface transition-colors p-xs rounded-DEFAULT hover:bg-surface-container-low">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<!-- Modal Body -->
<div class="p-lg flex flex-col gap-lg">
<!-- Session Name Input -->
<div class="flex flex-col gap-sm">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider" for="sessionName">Session Name</label>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-DEFAULT px-md py-sm font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/50 focus:outline-none focus:border-primary-container focus:ring-2 focus:ring-primary-container/20 transition-all" id="sessionName" placeholder="e.g., Q3 Customer Churn Analysis" type="text"/>
</div>
<!-- Dataset File Upload -->
<div class="flex flex-col gap-sm">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider">Dataset File</label>
<!-- Drag & Drop Area -->
<div class="border-2 border-dashed border-outline-variant rounded-lg p-xl flex flex-col items-center justify-center bg-surface-container-lowest hover:bg-surface-container-low hover:border-primary-container/50 transition-all group cursor-pointer">
<div class="w-12 h-12 rounded-full bg-surface-container flex items-center justify-center mb-md group-hover:bg-primary-container/10 group-hover:text-primary-container transition-colors">
<span class="material-symbols-outlined text-outline group-hover:text-primary-container" style="font-size: 24px;">cloud_upload</span>
</div>
<p class="font-body-md text-body-md text-on-surface font-medium text-center mb-xs">
                            Drag &amp; drop your file here
                        </p>
<p class="font-body-sm text-body-sm text-on-surface-variant text-center mb-md">
                            CSV, JSON, or Excel (max 500MB)
                        </p>
<button class="bg-surface-container-lowest border border-outline-variant rounded-DEFAULT px-md py-sm font-body-md text-body-md text-on-surface hover:bg-surface-container-low transition-colors" type="button">
                            Browse Files
                        </button>
</div>
</div>
</div>
<!-- Modal Footer -->
<div class="px-lg py-md border-t border-surface-variant bg-surface-bright flex items-center justify-end gap-md">
<button class="px-md py-sm bg-surface-container-lowest border border-outline-variant rounded-DEFAULT font-body-md text-body-md text-on-surface hover:bg-surface-container-low transition-colors" type="button">
                    Cancel
                </button>
<button class="px-md py-sm bg-primary-container border border-primary-container rounded-DEFAULT font-body-md text-body-md text-on-primary hover:opacity-90 transition-opacity flex items-center gap-xs" type="button">
<span>Continue to Preview</span>
<span class="material-symbols-outlined" style="font-size: 18px;">arrow_forward</span>
</button>
</div>
</div>
</div>
</body></html>
